preview = true
target-version = "py310"
line-length = 160

[lint]
select = ["B", "C", "F", "W", "YTT", "ASYNC", "E", "UP"]
ignore = ["F401", "F403", "E722", "F821", "E402", "E741", "C901", "B017", "B023", "B020", "E731", "F405", "B011", "E721", "B008", "C420"]

[format]
preview = true
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"